<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>TradingView Ticker Tape</title>
<style>
  html, body {
    margin: 0;
    padding: 0;
    background: #000;
  }

  tv-ticker-tape {
    width: 100%;
    height: 50px; /* pas hier de hoogte aan naar je Notion embed */
    display: block;
  }
</style>
</head>
<body>

<script type="module" src="https://widgets.tradingview-widget.com/w/en/tv-ticker-tape.js"></script>

<tv-ticker-tape 
  symbols='FX:EURUSD,BITSTAMP:BTCUSD,CMCMARKETS:GOLD,CAPITALCOM:US100,CAPITALCOM:DXY'
  theme="dark">
</tv-ticker-tape>

</body>
</html>
